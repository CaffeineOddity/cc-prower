# Feishu Provider Configuration
project_name: My Feishu Bot  # Optional: Project name for display and tmux session

provider:
  name: feishu
  app_id: "cli_app_id_here"
  app_secret: "your_app_secret_here"
  chat_id: "oc_chat_id_here"
  priority: 10
  keyword: ""  # Optional: only trigger if message contains this keyword
  bot_name: "Claude Bot"
  allowed_users:
    - "ou_user_id_1"
    - "ou_user_id_2"

session:
  max_history: 50
  timeout_minutes: 30