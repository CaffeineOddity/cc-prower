# WhatsApp Provider Configuration
project_name: My WhatsApp Bot  # Optional: Project name for display and tmux session

provider:
  name: whatsapp
  phone_number: "your_phone_number_id_here"
  api_key: "your_api_key_here"
  chat_id: "+1234567890"
  priority: 10
  keyword: ""  # Optional: only trigger if message contains this keyword

session:
  max_history: 50
  timeout_minutes: 30