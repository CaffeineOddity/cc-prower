# cc-connect-carry 配置示例

WebSocket:
  port: 8080
  host: "127.0.0.1"

# 日志配置
logging:
  level: "info"
  # 可选: 日志文件路径
  file: "~/.cc-power/tmp/logs/cc-power.log"

# Provider 配置（仅用于启用/禁用，具体配置由客户端项目提供）
providers:
  feishu:
    enabled: true
  telegram:
    enabled: true
  whatsapp:
    enabled: false
  custom:
    enabled: true