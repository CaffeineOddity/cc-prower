<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>打地鼠游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: white;
            font-size: 3rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin-bottom: 10px;
        }

        .stats {
            display: flex;
            gap: 30px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .stat {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            padding: 10px 30px;
            border-radius: 20px;
            color: white;
            font-size: 1.2rem;
        }

        .stat span {
            font-weight: bold;
            font-size: 1.5rem;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            max-width: 600px;
            width: 100%;
        }

        .hole {
            position: relative;
            aspect-ratio: 1;
            background: linear-gradient(to bottom, #8B4513 0%, #654321 100%);
            border-radius: 50%;
            overflow: hidden;
            cursor: pointer;
            box-shadow: inset 0 10px 20px rgba(0,0,0,0.5),
                        0 5px 15px rgba(0,0,0,0.3);
            border: 8px solid #5D3A1A;
        }

        .mole {
            position: absolute;
            bottom: -100%;
            left: 50%;
            transform: translateX(-50%);
            width: 70%;
            height: 70%;
            background: linear-gradient(to bottom, #8B6914 0%, #6B5A0C 100%);
            border-radius: 50% 50% 40% 40%;
            transition: bottom 0.3s ease-out;
        }

        .mole.up {
            bottom: 10%;
        }

        .mole::before {
            content: '';
            position: absolute;
            top: 20%;
            left: 20%;
            width: 30%;
            height: 30%;
            background: white;
            border-radius: 50%;
        }

        .mole::before::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40%;
            height: 40%;
            background: #333;
            border-radius: 50%;
        }

        .mole::after {
            content: '';
            position: absolute;
            top: 55%;
            left: 50%;
            transform: translateX(-50%);
            width: 40%;
            height: 25%;
            background: #FFD700;
            border-radius: 50%;
        }

        .mole.hit {
            background: linear-gradient(to bottom, #FF6B6B 0%, #EE5A5A 100%);
        }

        .controls {
            margin-top: 30px;
            display: flex;
            gap: 15px;
        }

        .btn {
            padding: 15px 40px;
            font-size: 1.2rem;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .btn-start {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }

        .btn-start:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .game-over {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .game-over.show {
            opacity: 1;
            pointer-events: all;
        }

        .game-over-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            animation: popIn 0.5s ease;
        }

        @keyframes popIn {
            0% {
                transform: scale(0.5);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .game-over h2 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            color: #333;
        }

        .final-score {
            font-size: 3rem;
            color: #667eea;
            font-weight: bold;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🐹 打地鼠游戏 🐹</h1>
        <div class="stats">
            <div class="stat">得分: <span id="score">0</span></div>
            <div class="stat">时间: <span id="time">30</span>s</div>
        </div>
    </div>

    <div class="game-board">
        <div class="hole" data-index="0">
            <div class="mole"></div>
        </div>
        <div class="hole" data-index="1">
            <div class="mole"></div>
        </div>
        <div class="hole" data-index="2">
            <div class="mole"></div>
        </div>
        <div class="hole" data-index="3">
            <div class="mole"></div>
        </div>
        <div class="hole" data-index="4">
            <div class="mole"></div>
        </div>
        <div class="hole" data-index="5">
            <div class="mole"></div>
        </div>
        <div class="hole" data-index="6">
            <div class="mole"></div>
        </div>
        <div class="hole" data-index="7">
            <div class="mole"></div>
        </div>
        <div class="hole" data-index="8">
            <div class="mole"></div>
        </div>
    </div>

    <div class="controls">
        <button class="btn btn-start" id="startBtn">开始游戏</button>
    </div>

    <div class="game-over" id="gameOver">
        <div class="game-over-content">
            <h2>游戏结束!</h2>
            <div class="final-score">最终得分: <span id="finalScore">0</span></div>
            <button class="btn btn-start" id="restartBtn">再来一局</button>
        </div>
    </div>

    <script>
        const holes = document.querySelectorAll('.hole');
        const moles = document.querySelectorAll('.mole');
        const scoreDisplay = document.getElementById('score');
        const timeDisplay = document.getElementById('time');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');
        const gameOverModal = document.getElementById('gameOver');
        const finalScoreDisplay = document.getElementById('finalScore');

        let score = 0;
        let timeLeft = 30;
        let gameInterval;
        let moleInterval;
        let isPlaying = false;
        let lastHole = null;

        function randomTime(min, max) {
            return Math.round(Math.random() * (max - min) + min);
        }

        function randomHole(holes) {
            const idx = Math.floor(Math.random() * holes.length);
            const hole = holes[idx];
            if (hole === lastHole) {
                return randomHole(holes);
            }
            lastHole = hole;
            return hole;
        }

        function peep() {
            const time = randomTime(500, 1500);
            const hole = randomHole(holes);
            const mole = hole.querySelector('.mole');

            mole.classList.add('up');
            mole.classList.remove('hit');

            setTimeout(() => {
                mole.classList.remove('up');
                if (isPlaying) {
                    peep();
                }
            }, time);
        }

        function bonk(e) {
            if (!e.isTrusted) return;
            if (!this.classList.contains('up')) return;

            score += 10;
            scoreDisplay.textContent = score;
            this.classList.add('hit');
            this.classList.remove('up');
        }

        function updateTimer() {
            timeLeft--;
            timeDisplay.textContent = timeLeft;

            if (timeLeft <= 0) {
                endGame();
            }
        }

        function startGame() {
            if (isPlaying) return;

            isPlaying = true;
            score = 0;
            timeLeft = 30;
            scoreDisplay.textContent = score;
            timeDisplay.textContent = timeLeft;
            startBtn.disabled = true;
            startBtn.textContent = '游戏中...';

            peep();
            moleInterval = setInterval(peep, 1000);
            gameInterval = setInterval(updateTimer, 1000);
        }

        function endGame() {
            isPlaying = false;
            clearInterval(gameInterval);
            clearInterval(moleInterval);

            moles.forEach(mole => {
                mole.classList.remove('up');
                mole.classList.remove('hit');
            });

            startBtn.disabled = false;
            startBtn.textContent = '开始游戏';

            finalScoreDisplay.textContent = score;
            gameOverModal.classList.add('show');
        }

        function restartGame() {
            gameOverModal.classList.remove('show');
            startGame();
        }

        moles.forEach(mole => mole.addEventListener('click', bonk));
        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', restartGame);
    </script>
</body>
</html>
