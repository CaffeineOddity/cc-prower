
WebSocket:
  port: 8080
  host: "127.0.0.1"

# 日志配置 包含的日志级别
# - debug → 打印 debug、info、warn、error（所有日志）
# - info → 打印 info、warn、error
# - error → 只打印 error
logging:
  level: "debug"
  file: "~/.cc-power/tmp/logs/cc-power.log"

# Provider 配置
providers:
  feishu:
    enabled: true
  telegram:
    enabled: false
  whatsapp:
    enabled: false
  custom:
    enabled: true
