# cc-connect-carry 配置示例

# MCP 服务器配置
mcp:
  # 传输方式: stdio 或 http
  transport: "http"
  # HTTP 模式下的端口（仅当 transport=http 时使用）
  port: 8888
  host: "127.0.0.1"

# 项目配置目录
projects_dir: "./projects"

# 日志配置
logging:
  level: "debug"
  file: "./logs/cc-power.log"

# Provider 配置
providers:
  feishu:
    enabled: true
  telegram:
    enabled: false
  whatsapp:
    enabled: false